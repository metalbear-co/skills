name: Update mirrord-config references

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest schema
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/metalbear-co/mirrord/main/mirrord-schema.json \
            -o /tmp/schema.json

      - name: Fetch latest configuration
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/metalbear-co/mirrord.dev/main/content/docs/reference/configuration.md \
            -o /tmp/configuration.md

      - name: Check for changes, update, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCHEMA_CHANGED=false
          CONFIG_CHANGED=false

          if ! diff -q /tmp/schema.json skills/mirrord-config/references/schema.json >/dev/null 2>&1; then
            SCHEMA_CHANGED=true
          fi

          if ! diff -q /tmp/configuration.md skills/mirrord-config/references/configuration.md >/dev/null 2>&1; then
            CONFIG_CHANGED=true
          fi

          if [ "$SCHEMA_CHANGED" = false ] && [ "$CONFIG_CHANGED" = false ]; then
            echo "No changes detected, skipping."
            exit 0
          fi

          # Copy updated files
          cp /tmp/schema.json skills/mirrord-config/references/schema.json
          cp /tmp/configuration.md skills/mirrord-config/references/configuration.md

          # Bump mirrord-config version
          python3 -c "
          import re, pathlib
          p = pathlib.Path('skills/mirrord-config/SKILL.md')
          text = p.read_text()
          def bump(m):
              major, minor = m.group(1).split('.')
              return f'version: \"{major}.{int(minor)+1}\"'
          text = re.sub(r'version: \"([\d.]+)\"', bump, text, count=1)
          p.write_text(text)
          "

          # Read new version
          NEW_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('skills/mirrord-config/SKILL.md').read_text()
          print(re.search(r'version: \"([\d.]+)\"', text).group(1))
          ")

          # Build description of what changed
          UPDATED=""
          if [ "$SCHEMA_CHANGED" = true ]; then UPDATED="schema"; fi
          if [ "$CONFIG_CHANGED" = true ]; then
            [ -n "$UPDATED" ] && UPDATED="$UPDATED + config" || UPDATED="config"
          fi

          # Create branch and commit
          BRANCH="auto/update-mirrord-config-refs-v${NEW_VERSION}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/mirrord-config/
          git commit -m "Update mirrord-config references ($UPDATED) → v${NEW_VERSION}

          Auto-updated from upstream sources:
          - schema: https://raw.githubusercontent.com/metalbear-co/mirrord/main/mirrord-schema.json
          - config: https://raw.githubusercontent.com/metalbear-co/mirrord.dev/main/content/docs/reference/configuration.md"
          git push -u origin "$BRANCH"

          # Open PR and assign reviewer
          gh pr create \
            --title "Update mirrord-config references → v${NEW_VERSION}" \
            --body "$(cat <<EOF
          ## Summary
          - Updated mirrord-config references ($UPDATED)
          - Bumped skill version to v${NEW_VERSION}

          ### Sources
          - schema: metalbear-co/mirrord \`mirrord-schema.json\`
          - config: metalbear-co/mirrord.dev \`content/docs/reference/configuration.md\`

          > Auto-generated by the weekly update-references workflow.
          EOF
          )" \
            --reviewer aris-cub \
            --reviewer adnazujolakisic \
            --reviewer danielbaker
